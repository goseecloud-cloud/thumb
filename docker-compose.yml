version: '3.8'

services:

  # ── FastAPI 앱 (기존 nginx가 8866 포트로 프록시) ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thumbnail-app
    restart: unless-stopped
    ports:
      - "8866:8866"    # 호스트 nginx → 컨테이너 직접 접근
    volumes:
      - thumbnail_output:/app/output
    environment:
      - TZ=Asia/Seoul
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8866/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  thumbnail_output:
