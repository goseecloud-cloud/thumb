# /etc/nginx/sites-available/thumb.goseecloud.com
# 아래 명령어로 적용:
#   sudo ln -s /etc/nginx/sites-available/thumb.goseecloud.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# ── HTTP → HTTPS 리다이렉트 ──
server {
    listen 80;
    server_name thumb.goseecloud.com;

    # Let's Encrypt 인증서 발급용
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 본 서버 ──
server {
    listen 443 ssl http2;
    server_name thumb.goseecloud.com;

    ssl_certificate     /etc/letsencrypt/live/thumb.goseecloud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thumb.goseecloud.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 10M;
    proxy_read_timeout   180s;
    proxy_connect_timeout 10s;
    proxy_send_timeout   180s;

    location / {
        proxy_pass         http://127.0.0.1:8866;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
