# ── HTTP → HTTPS 리다이렉트 ──
server {
    listen 80;
    server_name thumb.goseecloud.com;

    # Let's Encrypt 인증서 발급용 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 나머지 모든 요청은 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 메인 서버 ──
server {
    listen 443 ssl http2;
    server_name thumb.goseecloud.com;

    # SSL 인증서 (certbot이 발급)
    ssl_certificate     /etc/letsencrypt/live/thumb.goseecloud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thumb.goseecloud.com/privkey.pem;

    # SSL 보안 설정
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers on;

    # 업로드 크기 제한 (10MB)
    client_max_body_size 10M;

    # 타임아웃 (썸네일 생성 시간 고려)
    proxy_read_timeout    180s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    180s;

    # FastAPI로 프록시
    location / {
        proxy_pass         http://thumbnail-app:8866;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # 정적 파일 (output 이미지) 직접 서빙 (Nginx가 FastAPI 대신 처리)
    location /output/ {
        alias /app/output/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
